# Reusable workflow: run tests and build multi-arch static binaries.
# Called by release.yaml and snapshot.yaml.
name: _CI

on:
  workflow_call:
    inputs:
      artifact-retention-days:
        description: "Days to retain build artifacts"
        type: number
        default: 1

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  image-defaults-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check image defaults are in sync
        run: bash scripts/sync-image-defaults.sh && git diff --exit-code charts/servarr-operator/values.yaml

  check-crd-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Generate CRDs
        run: bash scripts/generate-crds.sh

      - name: Check for drift
        run: git diff --exit-code charts/servarr-crds/templates/*.yaml

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cargo-llvm-cov

      - name: Run tests with coverage
        run: |
          threshold=$(cat .coverage-threshold)
          cargo llvm-cov --workspace --fail-under-lines "$threshold" --summary-only

  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
            os: linux
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            arch: arm64
            os: linux
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            arch: amd64
            os: darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            arch: arm64
            os: darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          key: ${{ matrix.os }}-${{ matrix.arch }}

      - name: Install musl toolchain
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools
          rustup target add ${{ matrix.target }}

      - name: Install Rust target (macOS)
        if: matrix.os == 'darwin'
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (arm64 only)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        uses: taiki-e/install-action@9bcaee1dcae34154180f412e2fa69355a7cda9f6 # v2.82.6
        with:
          tool: cross

      - name: Build static release binary
        run: |
          if [ "${{ matrix.os }}" = "linux" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            # gcc-aarch64-linux-gnu targets glibc; on Ubuntu 24.04 it emits
            # __isoc23_sscanf and __*_chk symbols that musl does not provide.
            # cross uses a Docker image with a proper musl cross-toolchain.
            cross build --release --target ${{ matrix.target }} --bin servarr-operator
          else
            cargo build --release --target ${{ matrix.target }} --bin servarr-operator
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: operator-binary-${{ matrix.os }}-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/servarr-operator
          retention-days: ${{ inputs.artifact-retention-days }}
