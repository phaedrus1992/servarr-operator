name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.v.outputs.semver }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Compute version from tag
        id: v
        run: |
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "semver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Cargo version and changelog
        env:
          SEMVER: ${{ steps.v.outputs.semver }}
        run: |
          set -euo pipefail
          cargo_version="$(awk -F'"' '/^version = /{print $2; exit}' Cargo.toml)"
          if [ "${cargo_version}" != "${SEMVER}" ]; then
            echo "::error::tag v${SEMVER} does not match [workspace.package] version ${cargo_version}" >&2
            exit 1
          fi
          if ! scripts/changelog-extract.sh "${SEMVER}" CHANGELOG.md >/dev/null; then
            echo "::error::no CHANGELOG.md section for ${SEMVER}; did cargo-release run?" >&2
            exit 1
          fi
          echo "version ${SEMVER}: tag, Cargo.toml, and CHANGELOG.md agree"

  ci:
    uses: ./.github/workflows/_ci.yaml
    with:
      artifact-retention-days: 5

  publish:
    needs: [version, ci]
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/_publish.yaml
    with:
      image-tags: |-
        ${{ needs.version.outputs.semver }}
        latest
      image-version-label: ${{ needs.version.outputs.semver }}
      chart-version: ${{ needs.version.outputs.semver }}
      chart-app-version: ${{ needs.version.outputs.semver }}
      create-github-release: true
      release-tag: ${{ needs.version.outputs.tag }}
