name: Close issues on release-branch merge

# GitHub only auto-closes "Closes #N" references when a PR merges into the
# repository's *default* branch. This repo merges bug fixes and small
# enhancements into release/X.x branches instead, so those references never
# fire natively — this workflow replicates the same keyword parsing manually.
on:
  pull_request:
    types: [closed]
    branches:
      - 'release/**'

permissions:
  contents: read

jobs:
  close-referenced-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close issues referenced in PR body
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          ISSUES=$(printf '%s' "$PR_BODY" \
            | grep -oiP '\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\s*:?\s*#\K[0-9]+' \
            | sort -u || true)
          if [[ -z "$ISSUES" ]]; then
            echo "No closing keywords found in PR #$PR_NUMBER body"
            exit 0
          fi
          while IFS= read -r ISSUE; do
            echo "Closing #$ISSUE (referenced by PR #$PR_NUMBER)"
            gh issue close "$ISSUE" --repo "$REPO" \
              --comment "Closed via #$PR_NUMBER (merged into \`$PR_BASE\`, not the default branch, so GitHub's native auto-close didn't fire)." \
              || echo "::warning::Failed to close #$ISSUE (may already be closed)"
          done <<< "$ISSUES"
