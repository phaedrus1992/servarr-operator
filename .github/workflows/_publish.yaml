# Reusable workflow: publish multi-arch container image and Helm charts to GHCR.
# Called by release.yaml and nightly.yaml.
name: _Publish

on:
  workflow_call:
    inputs:
      image-tags:
        description: "Newline-separated container image tags (e.g. 'v1.0.0\\nlatest')"
        type: string
        required: true
      image-version-label:
        description: "Value for org.opencontainers.image.version OCI label"
        type: string
        required: true
      chart-version:
        description: "Helm chart version (semver)"
        type: string
        required: true
      chart-app-version:
        description: "Helm chart appVersion"
        type: string
        required: true
      create-github-release:
        description: "Create a GitHub Release with attached binaries"
        type: boolean
        default: false
      release-tag:
        description: "Git tag for the GitHub Release (required if create-github-release is true)"
        type: string
        default: ""

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/phaedrus1992/servarr-operator
  HELM_REGISTRY: oci://ghcr.io/phaedrus1992/servarr

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-binary-linux-amd64
          path: /tmp/bin-amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-binary-linux-arm64
          path: /tmp/bin-arm64

      - name: Download darwin-amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-binary-darwin-amd64
          path: /tmp/bin-darwin-amd64

      - name: Download darwin-arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: operator-binary-darwin-arm64
          path: /tmp/bin-darwin-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build context
        run: |
          mkdir -p /tmp/docker-context
          chmod +x /tmp/bin-amd64/servarr-operator /tmp/bin-arm64/servarr-operator
          cp -f /tmp/bin-amd64/servarr-operator /tmp/docker-context/servarr-operator-amd64
          cp -f /tmp/bin-arm64/servarr-operator /tmp/docker-context/servarr-operator-arm64

          cat > /tmp/docker-context/Dockerfile <<'DOCKERFILE'
          FROM gcr.io/distroless/static-debian12:nonroot
          ARG TARGETARCH
          COPY servarr-operator-${TARGETARCH} /servarr-operator
          ENTRYPOINT ["/servarr-operator"]
          DOCKERFILE

      - name: Build tag flags
        id: tags
        env:
          IMAGE_TAGS: ${{ inputs.image-tags }}
        run: |
          # Convert newline-separated tags into --tag flags
          flags=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            flags="${flags} --tag ${IMAGE_NAME}:${tag}"
          done <<< "$IMAGE_TAGS"
          echo "flags=${flags}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch container image
        env:
          TAG_FLAGS: ${{ steps.tags.outputs.flags }}
          IMAGE_VERSION_LABEL: ${{ inputs.image-version-label }}
        run: |
          # shellcheck disable=SC2086  # TAG_FLAGS is intentionally word-split into multiple --tag flags
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            $TAG_FLAGS \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=${IMAGE_VERSION_LABEL}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --push \
            /tmp/docker-context

      - name: Detect CRD template changes and bump version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          CRD_CHART_VERSION="$(grep '^version: ' charts/servarr-crds/Chart.yaml | awk '{print $2}')"
          export CRD_CHART_VERSION

          PREV_TAG="$(git describe --tags --abbrev=0 --match 'v*' HEAD^ 2>/dev/null || true)"

          if [ -z "${PREV_TAG}" ]; then
            echo "No previous release tag found — this is the first release."
            echo "CRD_CHART_CHANGED=true" >> "$GITHUB_ENV"
            echo "CRD_CHART_VERSION=${CRD_CHART_VERSION}" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Previous release tag: ${PREV_TAG}"

          if git diff --exit-code "${PREV_TAG}" -- charts/servarr-crds/templates/ >/dev/null 2>&1; then
            echo "CRD templates unchanged since ${PREV_TAG}; skipping CRD chart publication."
            echo "CRD_CHART_CHANGED=false" >> "$GITHUB_ENV"
            echo "CRD_CHART_VERSION=${CRD_CHART_VERSION}" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "CRD templates changed since ${PREV_TAG}; bumping version."

          MAJOR_MINOR="$(echo "${CRD_CHART_VERSION}" | cut -d. -f1-2)"
          PATCH="$(echo "${CRD_CHART_VERSION}" | cut -d. -f3)"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR_MINOR}.${NEW_PATCH}"

          sed -i 's/^version: .*/version: '"${NEW_VERSION}"'/' charts/servarr-crds/Chart.yaml

          echo "CRD chart version bumped: ${CRD_CHART_VERSION} → ${NEW_VERSION}"
          echo "CRD_CHART_CHANGED=true" >> "$GITHUB_ENV"
          echo "CRD_CHART_VERSION=${NEW_VERSION}" >> "$GITHUB_ENV"

          # Commit and push the version bump back to the release branch so the
          # next release starts from the correct CRD chart version.
          RELEASE_BRANCH="$(git branch -a --contains HEAD | grep -E 'remotes/origin/release/' | head -1 | sed 's|.*remotes/origin/||' || true)"

          if [ -n "${RELEASE_BRANCH}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add charts/servarr-crds/Chart.yaml
            git commit -m "chore: bump CRD chart to ${NEW_VERSION}"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${RELEASE_BRANCH}"
            echo "Committed and pushed CRD chart version bump to ${RELEASE_BRANCH}"
          else
            echo "Warning: could not determine release branch; version bump was not committed."
          fi

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Package and push Helm charts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHART_VERSION: ${{ inputs.chart-version }}
          CHART_APP_VERSION: ${{ inputs.chart-app-version }}
        run: |
          set -euo pipefail
          echo "$GITHUB_TOKEN" | helm registry login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

          if [ "${CRD_CHART_CHANGED}" = "true" ]; then
            helm dependency build charts/servarr-crds/
            helm package charts/servarr-crds/ \
              --version "${CRD_CHART_VERSION}" \
              --app-version "${CHART_APP_VERSION}" \
              -d /tmp/charts
            helm push "/tmp/charts/servarr-crds-${CRD_CHART_VERSION}.tgz" "${HELM_REGISTRY}"
          else
            echo "CRD templates unchanged — skipping CRD chart publication."
          fi

          # Package operator chart with the release version.
          helm dependency build charts/servarr-operator/
          helm package charts/servarr-operator/ \
            --version "${CHART_VERSION}" \
            --app-version "${CHART_APP_VERSION}" \
            -d /tmp/charts
          helm push "/tmp/charts/servarr-operator-${CHART_VERSION}.tgz" "${HELM_REGISTRY}"

      - name: Create GitHub Release
        if: inputs.create-github-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release-tag }}
          CHART_VERSION: ${{ inputs.chart-version }}
          IMAGE_VERSION_LABEL: ${{ inputs.image-version-label }}
        run: |
          set -euo pipefail

          cp -f /tmp/bin-amd64/servarr-operator /tmp/servarr-operator-linux-amd64
          cp -f /tmp/bin-arm64/servarr-operator /tmp/servarr-operator-linux-arm64
          cp -f /tmp/bin-darwin-amd64/servarr-operator /tmp/servarr-operator-darwin-amd64
          cp -f /tmp/bin-darwin-arm64/servarr-operator /tmp/servarr-operator-darwin-arm64
          chmod +x \
            /tmp/servarr-operator-linux-amd64 \
            /tmp/servarr-operator-linux-arm64 \
            /tmp/servarr-operator-darwin-amd64 \
            /tmp/servarr-operator-darwin-arm64

          version="${RELEASE_TAG#v}"

          {
            # 1. Curated, user-facing changelog for this version.
            scripts/changelog-extract.sh "${version}" CHANGELOG.md

            # 2. Helm install / upgrade instructions (CRDs first, then operator).
            echo ""
            echo "## Installing / Upgrading"
            echo ""
            echo '```bash'
            if [ "${CRD_CHART_CHANGED}" = "true" ]; then
              echo "# 1. Install/upgrade CRDs + webhook (do this first)"
              echo "helm upgrade --install servarr-crds \\"
              echo "  oci://ghcr.io/phaedrus1992/servarr/servarr-crds --version ${CRD_CHART_VERSION}"
              echo ""
              echo "# 2. Install/upgrade the operator"
            else
              echo "# CRD chart unchanged — no CRD upgrade needed this release."
              echo "# Install/upgrade the operator:"
            fi
            echo "helm upgrade --install servarr-operator \\"
            echo "  oci://ghcr.io/phaedrus1992/servarr/servarr-operator --version ${CHART_VERSION}"
            echo '```'

            # 3. Container image reference.
            echo ""
            echo "## Container image"
            echo ""
            echo '```'
            echo "ghcr.io/phaedrus1992/servarr-operator:${RELEASE_TAG}"
            echo '```'
          } >/tmp/release-body.md

          # 4. Auto-generated commit/PR notes, appended at the very end.
          prev_tag="$(git describe --tags --abbrev=0 --match 'v*' "${RELEASE_TAG}^" 2>/dev/null || true)"
          if [ -n "${prev_tag}" ]; then
            gen="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${RELEASE_TAG}" \
              -f previous_tag_name="${prev_tag}" \
              --jq .body)"
          else
            gen="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${RELEASE_TAG}" \
              --jq .body)"
          fi
          {
            echo ""
            echo "## Full Changelog"
            echo ""
            printf '%s\n' "${gen}"
          } >>/tmp/release-body.md

          # Idempotent: edit the release in place if the tag was re-pushed.
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --notes-file /tmp/release-body.md --latest
            gh release upload "${RELEASE_TAG}" --clobber \
              /tmp/servarr-operator-linux-amd64 \
              /tmp/servarr-operator-linux-arm64 \
              /tmp/servarr-operator-darwin-amd64 \
              /tmp/servarr-operator-darwin-arm64
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file /tmp/release-body.md \
              --verify-tag \
              --latest \
              /tmp/servarr-operator-linux-amd64 \
              /tmp/servarr-operator-linux-arm64 \
              /tmp/servarr-operator-darwin-amd64 \
              /tmp/servarr-operator-darwin-arm64
          fi
