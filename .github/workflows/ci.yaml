name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Stage 1: Fast lint ─────────────────────────────────────────────────
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check formatting
        run: cargo fmt --all --check

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0

      - name: Lint charts
        run: |
          helm lint charts/servarr-crds/ --set operatorNamespace=servarr
          helm lint charts/servarr-operator/
          helm dependency build charts/servarr-operator/
          helm template test charts/servarr-crds/ --set operatorNamespace=servarr > /dev/null
          helm template test charts/servarr-crds/ --set webhook.enabled=false > /dev/null
          helm template test charts/servarr-operator/ > /dev/null
          helm template test charts/servarr-operator/ --set watchAllNamespaces=true > /dev/null

  # ── Stage 2: Analysis + Tests ──────────────────────────────────────────
  clippy:
    needs: [fmt, actionlint, zizmor]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    needs: [fmt, actionlint, zizmor]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@b8be7f5e140177087325943c4a8e169d01c59b3d # v2.75.3
        with:
          tool: cargo-llvm-cov

      - name: Run tests with coverage
        run: |
          threshold=$(cat .coverage-threshold)
          cargo llvm-cov --workspace --fail-under-lines "$threshold" --summary-only 2>&1 | tee /tmp/coverage-summary.txt

      - name: Post coverage summary
        if: always()
        run: |
          {
            echo "### Code Coverage"
            echo ""
            echo '```'
            tail -5 /tmp/coverage-summary.txt
            echo '```'
            echo ""
            echo "Threshold: $(cat .coverage-threshold)% lines"
          } >> "$GITHUB_STEP_SUMMARY"
