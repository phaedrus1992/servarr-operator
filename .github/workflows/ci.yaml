name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - "docs/**"
      - "**.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Stage 1: Fast lint ─────────────────────────────────────────────────
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check formatting
        run: cargo fmt --all --check

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Lint charts
        run: |
          helm lint charts/servarr-crds/ --set operatorNamespace=servarr
          helm lint charts/servarr-operator/
          helm dependency build charts/servarr-operator/
          helm template test charts/servarr-crds/ --set operatorNamespace=servarr > /dev/null
          helm template test charts/servarr-crds/ --set webhook.enabled=false > /dev/null
          helm template test charts/servarr-operator/ > /dev/null
          helm template test charts/servarr-operator/ --set watchAllNamespaces=true > /dev/null

  image-defaults-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check image defaults are in sync
        run: bash scripts/sync-image-defaults.sh && git diff --exit-code charts/servarr-operator/values.yaml

  # ── Stage 2: Analysis + Tests ──────────────────────────────────────────
  clippy:
    needs: [fmt, actionlint, zizmor]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    needs: [fmt, actionlint, zizmor]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-llvm-cov

      - name: Run tests with coverage
        run: |
          set -o pipefail  # propagate cargo-llvm-cov's exit code through the tee pipe
          threshold=$(cat .coverage-threshold)
          cargo llvm-cov --workspace --fail-under-lines "$threshold" --summary-only 2>&1 | tee /tmp/coverage-summary.txt

      - name: Post coverage summary
        if: always()
        run: |
          {
            echo "### Code Coverage"
            echo ""
            echo '```'
            tail -5 /tmp/coverage-summary.txt
            echo '```'
            echo ""
            echo "Threshold: $(cat .coverage-threshold)% lines"
          } >> "$GITHUB_STEP_SUMMARY"
